spring:
  datasource:
    url: jdbc:h2:file:./data/demo;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE;DATABASE_TO_UPPER=FALSE
    driver-class-name: org.h2.Driver
    username: temp
    password: temp
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
  spring:
    thymeleaf:
      cache: false  #개발중에만 false로
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  error:
    include-message: always