<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>이미지 업로드 (Thymeleaf)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:24px}
        .card{max-width:720px;margin:0 auto;padding:24px;border:1px solid #e5e7eb;border-radius:12px}
        .row{display:flex;gap:12px;align-items:center;margin-top:12px;flex-wrap:wrap}
        .btn{cursor:pointer;border:0;background:#111827;color:#fff;padding:10px 16px;border-radius:8px}
        .muted{color:#6b7280;font-size:14px}.msg{margin-top:10px}
        .error{color:#b91c1c}.ok{color:#065f46}
    </style>
</head>
<body>
<div class="card">
    <h1>이미지 업로드</h1>
    <p class="muted">서버사이드 렌더링(Thymeleaf) — 업로드 후 갤러리로 이동합니다.</p>

    <div class="msg ok" th:if="${message}" th:text="${message}"></div>
    <div class="msg error" th:if="${error}" th:text="${error}"></div>

    <form th:action="@{/upload}" method="post" enctype="multipart/form-data" class="row">
        <!-- 단일/다중 둘 다 노출: 컨트롤러가 둘 다 처리 -->
        <input type="file" name="file" accept="image/*"/>
        <input type="file" name="files" accept="image/*" multiple/>
        <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button class="btn" type="submit">업로드</button>
    </form>

    <p class="muted" style="margin-top:12px;">
        목록 보기: <a th:href="@{/gallery}">/gallery</a>
    </p>
</div>
</body>
</html>
