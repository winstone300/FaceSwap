<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>로그인</title>
    <style>
        body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:24px}
        .card{max-width:960px;margin:0 auto;padding:24px}
        .row{display:flex;align-items:center;gap:12px}
        .btn{padding:6px 10px;border:1px solid #e5e7eb;border-radius:8px;background:white;cursor:pointer}
        .muted{color:#6b7280;font-size:14px}
    </style>
</head>
<body>
<!-- 이하 동일 -->
<div class="card">
    <h2>로그인</h2>
    <form method="post" th:action="@{/login}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="row">
            <label style="width:90px">아이디</label>
            <input name="username" required/>
        </div>
        <div class="row" style="margin-top:8px">
            <label style="width:90px">비밀번호</label>
            <input type="password" name="password" required/>
        </div>
        <div style="margin-top:12px">
            <button class="btn" type="submit">로그인</button>
        </div>
    </form>
    <p class="muted" style="margin-top:12px">테스트 계정: user1/pass1, user2/pass2</p>
    <div th:if="${param.logout}">로그아웃 되었습니다.</div>
    <div th:if="${param.error}">로그인 실패</div>
</div>
</body>
</html>
