<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8"/>
    <title>FuseAnyPart 업로드</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        :root{--dash:#d1d5db;--muted:#6b7280;--slot-size:260px; }
        body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;margin:24px}

        /* 좌우 50:50 레이아웃 */
        .layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}

        /* 상단 바 */
        .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
        .topbar .right{display:flex;align-items:center;gap:10px}
        .btn{border:0;padding:10px 16px;border-radius:10px;color:#fff;background:#111827;cursor:pointer}
        .btn.btn-outline{background:#334155}
        .btn:disabled{opacity:.6;cursor:not-allowed}
        .note{color:#6b7280;font-size:14px}

        /* 좌측: 2×2 정사각형 슬롯 그리드 */
        .slots{
            display:grid;
            grid-template-columns: repeat(2, var(--slot-size)); /* 2열 */
            gap:16px;
        }
        .card{border:2px dashed var(--dash);border-radius:12px;padding:12px;display:flex;flex-direction:column}
        .card h3{margin:0 0 8px 0}

        /* 정사각형 드롭존 */
        .drop{
            width:100%;
            aspect-ratio:1 / 1;         /* 핵심: 정사각형 */
            border:1px dashed #e5e7eb;
            border-radius:10px;
            background:#fafafa;
            position:relative;
            overflow:hidden;
            cursor:pointer;
        }
        .placeholder{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#6b7280}
        .preview{position:absolute;inset:0;display:none}
        .preview img{width:100%;height:100%;object-fit:contain;display:block}

        .small{margin-top:8px;border:1px solid #111827;background:#fff;color:#111827;border-radius:6px;padding:6px 10px;cursor:pointer;align-self:flex-start}
        .hint{margin:6px 0 0 0;color:#6b7280;font-size:13px}

        /* 진행바 & 버튼 블록은 좌측 하단에 전체 폭으로 */
        .left-actions{grid-column:1 / -1}
        .progress{height:8px;background:#f1f5f9;border-radius:999px;overflow:hidden;margin:10px 0}
        .bar{height:100%;width:0%;background:#111827;transition:width .2s}

        /* 우측 결과: 가로로 나열 */
        .results{display:flex;gap:12px;flex-wrap:nowrap;overflow-x:auto;border:1px solid #e5e7eb;border-radius:12px;padding:12px;min-height:400px;background:#fff}
        .results img{height:200px;border-radius:10px;border:1px solid #e5e7eb;display:block}
    </style>
</head>
<body>
<!-- 상단 바 -->
<div class="topbar">
    <h1 style="margin:0;">FuseAnyPart 업로드</h1>
    <div class="right">
        <span class="note"><span sec:authentication="name"></span> 님</span>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <button class="btn btn-outline" type="submit">로그아웃</button>
        </form>
    </div>
</div>

<div class="layout">
    <!-- 좌측 50%: 2x2 정사각형 슬롯 -->
    <div class="slots">
        <!-- Face -->
        <div class="card" id="faceCard">
            <h3>Face (필수)</h3>
            <label class="drop" for="faceInput" id="faceDrop">
                <div class="placeholder">+ Face 추가</div>
                <div class="preview"><img id="facePreview" alt="face"></div>
            </label>
            <input id="faceInput" type="file" accept="image/*" style="display:none"/>
            <button class="small" type="button" id="faceClear">지우기</button>
            <p class="hint">합성의 기준이 되는 얼굴 이미지.</p>
        </div>

        <!-- Eyes -->
        <div class="card" id="eyesCard">
            <h3>Eyes (옵션)</h3>
            <label class="drop" for="eyesInput" id="eyesDrop">
                <div class="placeholder">+ Eyes 추가</div>
                <div class="preview"><img id="eyesPreview" alt="eyes"></div>
            </label>
            <input id="eyesInput" type="file" accept="image/*" style="display:none"/>
            <button class="small" type="button" id="eyesClear">지우기</button>
            <p class="hint">눈 영역 교체용.</p>
        </div>

        <!-- Nose -->
        <div class="card" id="noseCard">
            <h3>Nose (옵션)</h3>
            <label class="drop" for="noseInput" id="noseDrop">
                <div class="placeholder">+ Nose 추가</div>
                <div class="preview"><img id="nosePreview" alt="nose"></div>
            </label>
            <input id="noseInput" type="file" accept="image/*" style="display:none"/>
            <button class="small" type="button" id="noseClear">지우기</button>
            <p class="hint">코 영역 교체용.</p>
        </div>

        <!-- Mouth -->
        <div class="card" id="mouthCard">
            <h3>Mouth (옵션)</h3>
            <label class="drop" for="mouthInput" id="mouthDrop">
                <div class="placeholder">+ Mouth 추가</div>
                <div class="preview"><img id="mouthPreview" alt="mouth"></div>
            </label>
            <input id="mouthInput" type="file" accept="image/*" style="display:none"/>
            <button class="small" type="button" id="mouthClear">지우기</button>
            <p class="hint">입 영역 교체용.</p>
        </div>

        <!-- 진행/버튼 (그리드 가로폭 전체) -->
        <div class="left-actions">
            <div class="progress"><div id="bar" class="bar"></div></div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
                <button id="uploadBtn" class="btn" type="button">업로드</button>
                <a th:href="@{/gallery}" class="btn btn-outline" role="button">갤러리로 이동</a>
                <span id="msg" class="note"></span>
            </div>
        </div>

        <!-- CSRF -->
        <input type="hidden" id="csrfName"  th:if="${_csrf}" th:value="${_csrf.headerName}"/>
        <input type="hidden" id="csrfToken" th:if="${_csrf}" th:value="${_csrf.token}"/>
    </div>

    <!-- 우측 50%: 결과 영역(가로) -->
    <div class="results" id="results"></div>
</div>

<script>
    /* ========= 상태 ========= */
    let faceFile=null, eyesFile=null, noseFile=null, mouthFile=null;
    const UPLOAD_URL='/upload';
    const bar = document.getElementById('bar');
    const msg = document.getElementById('msg');
    const results = document.getElementById('results');
    const uploadBtn = document.getElementById('uploadBtn');
    let busy = false;

    /* ========= 슬롯 바인딩 ========= */
    bindSlot('face', file => faceFile=file, true);
    bindSlot('eyes', file => eyesFile=file, false);
    bindSlot('nose', file => noseFile=file, false);
    bindSlot('mouth',file => mouthFile=file, false);

    function bindSlot(name, setter, required){
        const input = document.getElementById(name+'Input');
        const drop  = document.getElementById(name+'Drop');
        const prevBox = document.querySelector('#'+name+'Card .preview');
        const prevImg = document.getElementById(name+'Preview');
        const clearBtn= document.getElementById(name+'Clear');

        input.addEventListener('change', ()=> setFile(input.files?.[0]));
        clearBtn.addEventListener('click', ()=> setFile(null));

        ;['dragenter','dragover'].forEach(evt=>{
            drop.addEventListener(evt, e=>{e.preventDefault();e.stopPropagation();drop.style.background='#f9fafb';});
        });
        ;['dragleave','drop'].forEach(evt=>{
            drop.addEventListener(evt, e=>{e.preventDefault();e.stopPropagation();drop.style.background='#fafafa';});
        });
        drop.addEventListener('drop', e=>{
            const f=[...(e.dataTransfer.files||[])].find(x=>x.type.startsWith('image/'));
            if (f) setFile(f);
        });

        function setFile(f){
            setter(f||null);
            if (f){
                const url = URL.createObjectURL(f);
                prevImg.src = url;
                prevBox.style.display='block';
                drop.querySelector('.placeholder').style.display='none';
            }else{
                prevImg.src = '';
                prevBox.style.display='none';
                drop.querySelector('.placeholder').style.display='flex';
                input.value='';
            }
        }
    }

    /* ========= 업로드 (한 번만 동작) ========= */
    uploadBtn.addEventListener('click', (e)=>{
        e.preventDefault();
        if (busy) return;
        if (!faceFile){ notify('Face 이미지는 필수입니다.'); return; }

        const fd = new FormData();
        // 백엔드 시그니처: files(리스트) + fap=1 + eyes/nose/mouth
        fd.append('files', faceFile);  // 첫 번째 파일을 target으로
        fd.append('fap','1');
        if (eyesFile)  fd.append('eyes', eyesFile);
        if (noseFile)  fd.append('nose', noseFile);
        if (mouthFile) fd.append('mouth',mouthFile);
        fd.append('parts','eyes,nose,mouth');
        fd.append('steps','50');
        fd.append('guidance','7.5');

        const csrfName = document.getElementById('csrfName')?.value;
        const csrfToken= document.getElementById('csrfToken')?.value;

        const xhr = new XMLHttpRequest();
        xhr.open('POST', UPLOAD_URL, true);
        xhr.responseType='json';
        xhr.setRequestHeader('Accept','application/json');
        if (csrfName && csrfToken) xhr.setRequestHeader(csrfName, csrfToken);

        xhr.upload.onprogress = e => { if (e.lengthComputable) setProgress(Math.round(e.loaded/e.total*100)); };

        xhr.onload = () => {
            setBusy(false);
            if (xhr.status>=200 && xhr.status<300){
                setProgress(100);
                const res = xhr.response || {};
                if (res.viewUrl){
                    appendResult(res.viewUrl);          // 우측 50%에 결과(가로) 추가
                    notify('처리 완료');
                    return;
                }
                if (res.redirect){
                    location.href = res.redirect;      // 일반 업로드 대응
                    return;
                }
                location.href = '/gallery';
            } else {
                setProgress(0);
                notify(`업로드 실패 (HTTP ${xhr.status}) ${xhr.responseText||''}`);
            }
        };
        xhr.onerror = () => { setBusy(false); setProgress(0); notify('네트워크 오류'); };

        setBusy(true); setProgress(0); notify('');
        xhr.send(fd);
    });

    /* ========= 헬퍼 ========= */
    function setBusy(b){ busy=b; uploadBtn.disabled=b; }
    function setProgress(p){ bar.style.width=(p||0)+'%'; }
    function notify(t){ msg.textContent=t; }
    function appendResult(url){
        const img=new Image();
        img.src=url; img.alt='result';
        results.appendChild(img);
    }
</script>
</body>
</html>
